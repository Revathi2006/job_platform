  <line class="link" x1="1620" y1="1064" x2="1500" y2="1104" />

  <ellipse class="attr" cx="1430" cy="1190" rx="190" ry="30" />
  <text class="attrText" x="1430" y="1196" text-anchor="middle">applicantPhone</text>
  <line class="link" x1="1670" y1="1064" x2="1500" y2="1174" />

  <ellipse class="attr" cx="2010" cy="980" rx="200" ry="30" />
